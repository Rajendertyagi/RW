name: Build Portable Repowise
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the Actions tab
jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install repowise pyinstaller
      - name: Package with PyInstaller
        run: |
          pyinstaller --onedir --name repowise --clean `
            --hidden-import=tree_sitter `
            --hidden-import=tree_sitter_python `
            --hidden-import=tree_sitter_typescript `
            --hidden-import=tree_sitter_javascript `
            --hidden-import=tree_sitter_go `
            --hidden-import=tree_sitter_rust `
            --hidden-import=tree_sitter_java `
            --hidden-import=tree_sitter_cpp `
            --hidden-import=tree_sitter_bash `
            run.py
      - name: Create Zip Archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist/repowise/* -DestinationPath repowise-windows-portable.zip
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repowise-windows-portable
          path: repowise-windows-portable.zip
          retention-days: 7
