name: Build Portable Repowise
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the Actions tab
jobs:
  build:
    name: Build Windows Portable Zip
    runs-on: windows-latest
    steps:
      - name: Create Portable Directory Structure
        shell: pwsh
        run: |
          # 1. Download official Python 3.11 embeddable package
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip" -OutFile "python-embed.zip"
          
          # 2. Extract to target directory
          Expand-Archive -Path "python-embed.zip" -DestinationPath "repowise-portable"
          
          # 3. Enable site-packages in the embeddable python path configuration
          # We need to uncomment "import site" in the ._pth file
          $pthFile = "repowise-portable/python311._pth"
          (Get-Content $pthFile) -replace '#import site', 'import site' | Set-Content $pthFile
          
          # 4. Download get-pip.py to install pip inside the embed environment
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "repowise-portable/get-pip.py"
          
          # 5. Install pip
          .\repowise-portable\python.exe .\repowise-portable\get-pip.py --no-warn-script-location
          
          # 6. Install repowise package via the embedded pip
          .\repowise-portable\python.exe -m pip install repowise --no-warn-script-location
          
          # 7. Clean up setup files to keep it lightweight
          Remove-Item "repowise-portable/get-pip.py"
          Remove-Item "python-embed.zip"
      - name: Create Launcher Script
        shell: pwsh
        run: |
          # Create repowise.bat entrypoint in the root directory
          $batContent = @"
          @echo off
          REM Run repowise using the embedded Python environment
          "%~dp0python.exe" -m repowise.cli %*
          "@
          Set-Content -Path "repowise-portable/repowise.bat" -Value $batContent
      - name: Create Zip Archive
        shell: pwsh
        run: |
          Compress-Archive -Path repowise-portable/* -DestinationPath repowise-windows-portable.zip
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: repowise-windows-portable
          path: repowise-windows-portable.zip
          retention-days: 7
